name: Build Android ARMv7 HTTP server

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build httpserver ARMv7
        shell: bash
        run: |
          export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          $TOOLCHAIN/armv7a-linux-androideabi21-clang \
            -O2 \
            -fPIE \
            -pie \
            -Wall \
            -Wextra \
            httpserver.c \
            -o httpserver

          $TOOLCHAIN/llvm-strip httpserver

          file httpserver
          ls -lh httpserver

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: httpserver-android-armv7
          path: httpserver
